spring.application.name=sigcqal-api
server.port = 8081
server.servlet.context-path=/SIGCQAL_dev

spring.datasource.url=jdbc:postgresql://localhost:5432/SIGCQAL_dev?currentSchema=public,catalogos,correspondencia,atencion_juridica
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql = false


# Permitir archivos más grandes (ejemplo 10MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.batch.jdbc.initialize-schema=always

# Configuración de OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# Información de la API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
# Para ver errores específicos del Multipart (subida de archivos)
logging.level.org.apache.tomcat.util.http.fileupload=DEBUG


#springdoc.packages-to-scan=finanzas.avaluos_api
#springdoc.paths-to-match=/**


# Habilitar mensajes de validación detallados
server.error.include-message=always
server.error.include-binding-errors=always

